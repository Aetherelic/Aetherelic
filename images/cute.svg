<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250" role="img">
<defs>
<style>
 .star{animation:twinkle 2.5s ease-in-out infinite}
 .star:nth-child(2){animation-delay:.5s}.star:nth-child(3){animation-delay:1s}
 @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
</style>
</defs>


<rect width="1200" height="250" rx="28" fill="#f3f0e9"/>
<path d="M0 165 C180 115 350 210 550 160 S910 125 1200 175 V250 H0Z" fill="#98E8C1"/>
<path d="M0 198 C230 155 380 238 640 192 S975 170 1200 210 V250 H0Z" fill="#7BADE2" opacity=".75"/>
<text x="600" y="75" text-anchor="middle" font-family="Inter, Arial" font-size="31" font-weight="800" fill="#17202b">Thanks for stopping by.</text>
<text x="600" y="112" text-anchor="middle" font-family="Inter, Arial" font-size="17" fill="#55616f">Build useful things. Document them well. Make them look intentional.</text>
<g fill="#078D70"><circle class="star" cx="500" cy="140" r="4"/><circle class="star" cx="600" cy="140" r="4"/><circle class="star" cx="700" cy="140" r="4"/></g>

