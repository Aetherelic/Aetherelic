<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="178" viewBox="0 0 1200 178" role="img">
<defs>
<style>
 .star{animation:twinkle 2.4s ease-in-out infinite}
 .star:nth-child(2){animation-delay:.5s}.star:nth-child(3){animation-delay:1s}
 @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:1}}
</style>
</defs>
<rect width="100%" height="100%" rx="24" fill="#0b1020"/>

<text x="600" y="63" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="28" font-weight="800" fill="#f8fafc">BUILD • BREAK • LEARN • REBUILD</text>
<text x="600" y="101" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#b8c7d9">Linux enthusiast, open-source developer and chronic desktop customiser.</text>
<g fill="#98E8C1"><circle class="star" cx="455" cy="126" r="4"/><circle class="star" cx="600" cy="126" r="4"/><circle class="star" cx="745" cy="126" r="4"/></g>
<rect x="0.0" y="150" width="172" height="28" fill="#078D70"/><rect x="171.5" y="150" width="172" height="28" fill="#26CEAA"/><rect x="343.0" y="150" width="172" height="28" fill="#98E8C1"/><rect x="514.5" y="150" width="172" height="28" fill="#FFFFFF"/><rect x="686.0" y="150" width="172" height="28" fill="#7BADE2"/><rect x="857.5" y="150" width="172" height="28" fill="#5049CC"/><rect x="1029.0" y="150" width="172" height="28" fill="#3D1A78"/>

