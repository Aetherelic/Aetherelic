<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img">
<defs>
<linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#14232c"/>
  <stop offset=".48" stop-color="#182331"/>
  <stop offset="1" stop-color="#221a3b"/>
</linearGradient>
<linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#102029"/>
  <stop offset="1" stop-color="#151a2e"/>
</linearGradient>
<filter id="soft"><feGaussianBlur stdDeviation="18"/></filter>
<style>
  .float { animation: float 5s ease-in-out infinite; transform-origin:center; }
  .float2 { animation: float2 6s ease-in-out infinite; transform-origin:center; }
  .blink { animation: blink 1.1s steps(2,end) infinite; }
  .spark { animation: sparkle 2.4s ease-in-out infinite; }
  .spark:nth-of-type(2){animation-delay:.45s}
  .spark:nth-of-type(3){animation-delay:.9s}
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  @keyframes float2 { 0%,100%{transform:translateY(0) rotate(-2deg)} 50%{transform:translateY(8px) rotate(2deg)} }
  @keyframes blink { 50%{opacity:.1} }
  @keyframes sparkle { 0%,100%{opacity:.25;transform:scale(.8)} 50%{opacity:1;transform:scale(1.15)} }
</style>
</defs>


<rect width="1200" height="390" rx="28" fill="url(#hero)"/>
<circle cx="1030" cy="90" r="165" fill="#5049CC" opacity=".14" filter="url(#soft)"/>
<circle cx="150" cy="310" r="145" fill="#26CEAA" opacity=".13" filter="url(#soft)"/>
<path d="M0 20 C250 10, 420 32, 650 18 S980 7, 1200 22" stroke="#078D70" stroke-width="10" fill="none" opacity=".96"/><path d="M0 30 C250 20, 420 42, 650 28 S980 17, 1200 32" stroke="#26CEAA" stroke-width="10" fill="none" opacity=".96"/><path d="M0 40 C250 30, 420 52, 650 38 S980 27, 1200 42" stroke="#98E8C1" stroke-width="10" fill="none" opacity=".96"/><path d="M0 50 C250 40, 420 62, 650 48 S980 37, 1200 52" stroke="#FFFFFF" stroke-width="10" fill="none" opacity=".96"/><path d="M0 60 C250 50, 420 72, 650 58 S980 47, 1200 62" stroke="#7BADE2" stroke-width="10" fill="none" opacity=".96"/><path d="M0 70 C250 60, 420 82, 650 68 S980 57, 1200 72" stroke="#5049CC" stroke-width="10" fill="none" opacity=".96"/><path d="M0 80 C250 70, 420 92, 650 78 S980 67, 1200 82" stroke="#3D1A78" stroke-width="10" fill="none" opacity=".96"/>

<!-- left terminal illustration -->
<g class="float" transform="translate(68 118)">
  <rect width="350" height="205" rx="24" fill="#0b1018" stroke="#98E8C1" stroke-opacity=".35" stroke-width="2"/>
  <rect width="350" height="38" rx="24" fill="#1c2734"/>
  <rect y="20" width="350" height="18" fill="#1c2734"/>
  <circle cx="24" cy="20" r="6" fill="#ff7b72"/>
  <circle cx="45" cy="20" r="6" fill="#d29922"/>
  <circle cx="66" cy="20" r="6" fill="#3fb950"/>
  <text x="24" y="78" font-family="JetBrains Mono, monospace" font-size="17" fill="#98E8C1">aether@nixos ~</text>
  <text x="24" y="110" font-family="JetBrains Mono, monospace" font-size="16" fill="#7BADE2">❯ git status</text>
  <text x="24" y="140" font-family="JetBrains Mono, monospace" font-size="15" fill="#d8dee9">building something useful...</text>
  <text x="24" y="174" font-family="JetBrains Mono, monospace" font-size="16" fill="#26CEAA">done <tspan class="blink">█</tspan></text>
</g>

<!-- central identity -->
<g>
  <text x="705" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800" fill="#f0f6fc">Aetherelic</text>
  <text x="705" y="185" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="18" fill="#98E8C1">LINUX DEVELOPER • DESKTOP BUILDER</text>
  <text x="705" y="229" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#b8c3d1">Practical tools, declarative systems, and interfaces</text>
  <text x="705" y="255" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" fill="#b8c3d1">that look like somebody cared.</text>
  <rect x="526" y="284" width="358" height="44" rx="22" fill="#111923" stroke="#26CEAA" stroke-opacity=".75"/>
  <text x="705" y="312" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" fill="#98E8C1">NixOS • Python • QML • Hyprland</text>
</g>

<!-- right floating mascots -->
<g class="float2" transform="translate(1000 180)">
  <path d="M0 50 L52 0 L104 50 L52 100 Z" fill="#5277C3" opacity=".95"/>
  <path d="M52 16 L88 50 L52 84 L16 50 Z" fill="#e6f3ff" opacity=".9"/>
  <circle cx="52" cy="50" r="13" fill="#5277C3"/>
</g>
<g class="spark" fill="#98E8C1"><circle cx="1110" cy="145" r="5"/></g>
<g class="spark" fill="#7BADE2"><circle cx="957" cy="105" r="4"/></g>
<g class="spark" fill="#ffffff"><circle cx="1085" cy="300" r="4"/></g>

</svg>