<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="310" viewBox="0 0 1200 310" role="img">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#07111f"/>
  <stop offset="48%" stop-color="#102743"/>
  <stop offset="100%" stop-color="#11132f"/>
</linearGradient>
<filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<style>
  .float { animation: float 5s ease-in-out infinite; transform-origin:center; }
  .blink { animation: blink 1.1s steps(2,end) infinite; }
  .line { stroke-dasharray: 820; stroke-dashoffset: 820; animation: draw 3.2s ease forwards; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes blink { 50%{opacity:.15} }
  @keyframes draw { to{stroke-dashoffset:0} }
</style>
</defs>
<rect width="100%" height="100%" rx="24" fill="#0b1020"/>

<rect width="1200" height="310" rx="24" fill="url(#bg)"/>
<rect x="0" y="0" width="1200" height="8" fill="#078D70"/><rect x="0" y="8" width="1200" height="8" fill="#26CEAA"/><rect x="0" y="16" width="1200" height="8" fill="#98E8C1"/><rect x="0" y="24" width="1200" height="8" fill="#FFFFFF"/><rect x="0" y="32" width="1200" height="8" fill="#7BADE2"/><rect x="0" y="40" width="1200" height="8" fill="#5049CC"/><rect x="0" y="48" width="1200" height="8" fill="#3D1A78"/>
<g opacity=".16">
  <circle cx="105" cy="180" r="88" fill="#26CEAA"/>
  <circle cx="1080" cy="205" r="126" fill="#5049CC"/>
</g>
<g class="float">
  <text x="600" y="154" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="70" font-weight="800" fill="#f8fafc" letter-spacing="10" filter="url(#glow)">AETHERELIC</text>
  <text x="600" y="198" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="21" fill="#98E8C1">LINUX DEVELOPMENT • SYSTEM TOOLING • DESKTOP ENGINEERING</text>
</g>
<path class="line" d="M235 231 H965" stroke="#7BADE2" stroke-width="3" stroke-linecap="round"/>
<text x="600" y="267" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="17" fill="#cbd5e1">building practical tools with an unreasonable amount of polish <tspan class="blink">█</tspan></text>

</svg>