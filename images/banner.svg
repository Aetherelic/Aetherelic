<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="376" viewBox="0 0 1200 376" role="img">
<defs>
<linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0" stop-color="#123238"/>
  <stop offset=".48" stop-color="#17283A"/>
  <stop offset="1" stop-color="#251C43"/>
</linearGradient>
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
  <stop stop-color="#172433" stop-opacity=".95"/>
  <stop offset="1" stop-color="#0E1723" stop-opacity=".96"/>
</linearGradient>
<filter id="glow">
  <feGaussianBlur stdDeviation="5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<style>
  .cursor{animation:blink 1.05s steps(2,end) infinite}
  .node{animation:bob 4.8s ease-in-out infinite;transform-origin:center}
  .node2{animation:bob2 5.8s ease-in-out infinite;transform-origin:center}
  @keyframes blink{50%{opacity:.08}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
</style>
</defs>


<rect width="1200" height="376" rx="28" fill="url(#hero)"/>
<path d="M0 18 C235 7, 430 34, 640 19 S970 8, 1200 21" stroke="#078D70" stroke-width="9" fill="none"/><path d="M0 27 C235 16, 430 43, 640 28 S970 17, 1200 30" stroke="#26CEAA" stroke-width="9" fill="none"/><path d="M0 36 C235 25, 430 52, 640 37 S970 26, 1200 39" stroke="#98E8C1" stroke-width="9" fill="none"/><path d="M0 45 C235 34, 430 61, 640 46 S970 35, 1200 48" stroke="#FFFFFF" stroke-width="9" fill="none"/><path d="M0 54 C235 43, 430 70, 640 55 S970 44, 1200 57" stroke="#7BADE2" stroke-width="9" fill="none"/><path d="M0 63 C235 52, 430 79, 640 64 S970 53, 1200 66" stroke="#5049CC" stroke-width="9" fill="none"/><path d="M0 72 C235 61, 430 88, 640 73 S970 62, 1200 75" stroke="#3D1A78" stroke-width="9" fill="none"/>
<circle cx="90" cy="287" r="126" fill="#26CEAA" opacity=".10"/>
<circle cx="1115" cy="270" r="152" fill="#5049CC" opacity=".12"/>

<!-- bounded terminal -->
<g transform="translate(54 117)">
  <rect width="334" height="196" rx="22" fill="url(#glass)" stroke="#98E8C1" stroke-opacity=".42" stroke-width="2"/>
  <path d="M0 22 Q0 0 22 0 H312 Q334 0 334 22 V38 H0Z" fill="#253347"/>
  <circle cx="23" cy="19" r="6" fill="#FF7B72"/>
  <circle cx="44" cy="19" r="6" fill="#D29922"/>
  <circle cx="65" cy="19" r="6" fill="#3FB950"/>
  <text x="21" y="70" font-family="JetBrains Mono, monospace" font-size="14.5" fill="#98E8C1">aether@nixos ~</text>
  <text x="21" y="99" font-family="JetBrains Mono, monospace" font-size="14.5" fill="#7BADE2">❯ git status</text>
  <text x="21" y="128" font-family="JetBrains Mono, monospace" font-size="13.5" fill="#E5EDF5">building something useful...</text>
  <text x="21" y="159" font-family="JetBrains Mono, monospace" font-size="14.5" fill="#26CEAA">done <tspan class="cursor">█</tspan></text>
</g>

<!-- identity -->
<text x="760" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="63" font-weight="800" fill="#F8FAFC" filter="url(#glow)">Aetherelic</text>
<text x="760" y="188" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="17" fill="#98E8C1">LINUX DEVELOPER • DESKTOP BUILDER</text>
<text x="760" y="229" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#CBD5E1">Practical tools, declarative systems, and interfaces</text>
<text x="760" y="255" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="17" fill="#CBD5E1">that look like somebody cared.</text>

<rect x="574" y="283" width="372" height="44" rx="22" fill="#0C1520" stroke="#26CEAA" stroke-opacity=".8"/>
<text x="760" y="311" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14.5" fill="#98E8C1">NixOS • Python • QML • Hyprland</text>

<!-- geometric Linux ornament, fully bounded -->
<g class="node" transform="translate(1042 132)">
  <circle cx="58" cy="58" r="55" fill="#FFFFFF" opacity=".08"/>
  <path d="M58 8 L102 34 L102 82 L58 108 L14 82 L14 34 Z" fill="#5277C3" stroke="#D9ECFF" stroke-width="3"/>
  <path d="M58 26 L86 42 L86 74 L58 90 L30 74 L30 42 Z" fill="#F2F7FB"/>
  <circle cx="58" cy="58" r="14" fill="#5277C3"/>
</g>
<g class="node2" fill="#98E8C1"><circle cx="1010" cy="280" r="5"/><circle cx="1125" cy="105" r="4"/></g>

</svg>